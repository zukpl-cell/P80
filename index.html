<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P80</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
.container{padding:20px}
button{width:100%;padding:14px;margin:6px 0;background:#ff3c00;border:none;color:white;font-size:15px;border-radius:8px}
input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
.card{background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:12px}
h1{text-align:center}
.green{color:#00ff88}
.yellow{color:#ffd000}
.red{color:#ff4d4d}
canvas{background:#111;border-radius:10px;padding:10px}
</style>
</head>

<body>
<div class="container">

<h1>P80</h1>

<div class="card">
<div id="countdown"></div>
<div id="weightDisplay"></div>
<div id="calorieDisplay"></div>
</div>

<button onclick="show('analysis')">📊 Analiza</button>
<button onclick="show('checkin')">📝 Niedzielny Check-in</button>
<button onclick="show('settings')">⚙️ Ustawienia</button>

<div id="content"></div>

</div>

<script>

let targetDate = new Date("2026-06-10");
let entries = JSON.parse(localStorage.getItem("p80entries")) || [];
let calories = localStorage.getItem("p80calories") || 2050;

function updateHome(){
 let today = new Date();
 let diff = Math.ceil((targetDate - today)/(1000*60*60*24));
 document.getElementById("countdown").innerHTML = "🔥 Do celu: " + diff + " dni";
 document.getElementById("calorieDisplay").innerHTML = "Kalorie: " + calories + " kcal";

 if(entries.length>0){
   document.getElementById("weightDisplay").innerHTML = "Waga: " + entries[entries.length-1].weight + " kg";
 } else {
   document.getElementById("weightDisplay").innerHTML = "Brak wpisów";
 }
}

function show(section){
 let c = document.getElementById("content");

 if(section==="analysis"){
  let analysisHTML = `
  <div class="card">
  <h2>Analiza Redukcji</h2>
  <canvas id="weightChart"></canvas>
  <div id="trend"></div>
  <div id="recommendation"></div>
  </div>`;
  c.innerHTML = analysisHTML;
  drawChart();
  analyze();
 }

 if(section==="checkin"){
  c.innerHTML=`
  <div class="card">
  <h2>Niedzielny Check-in</h2>
  <input id="weight" placeholder="Waga">
  <input id="energy" placeholder="Energia 1-5">
  <button onclick="save()">Zapisz</button>
  </div>`;
 }

 if(section==="settings"){
  c.innerHTML=`
  <div class="card">
  <h2>Ustawienia</h2>
  <input id="newCal" placeholder="Nowe kalorie">
  <button onclick="saveCal()">Zapisz kalorie</button>
  </div>`;
 }
}

function save(){
 let entry={
  date:new Date().toISOString().split('T')[0],
  weight:parseFloat(document.getElementById("weight").value),
  energy:parseInt(document.getElementById("energy").value)
 };
 entries.push(entry);
 localStorage.setItem("p80entries",JSON.stringify(entries));
 updateHome();
 alert("Zapisano!");
}

function saveCal(){
 calories=document.getElementById("newCal").value;
 localStorage.setItem("p80calories",calories);
 updateHome();
 alert("Zapisano!");
}

function drawChart(){
 if(entries.length<1) return;

 let ctx = document.getElementById("weightChart");
 let labels = entries.map(e=>e.date);
 let weights = entries.map(e=>e.weight);

 new Chart(ctx, {
   type: 'line',
   data: {
     labels: labels,
     datasets: [{
       label: 'Waga',
       data: weights,
       borderColor: '#ff3c00',
       tension: 0.2
     }]
   },
   options: {
     plugins:{legend:{display:false}},
     scales:{x:{ticks:{color:"white"}},y:{ticks:{color:"white"}}}
   }
 });
}

function analyze(){
 if(entries.length<2){
   document.getElementById("trend").innerHTML = "Za mało danych.";
   return;
 }

 let last = entries[entries.length-1];
 let prev = entries[entries.length-2];
 let diff = prev.weight - last.weight;
 diff = diff.toFixed(2);

 let status="";
 let recommendation="";

 if(diff >=0.4 && diff<=0.8){
   status = `<p class="green">🟢 Tempo: -${diff} kg / tydzień (Optymalne)</p>`;
 }
 else if(diff <0.3){
   status = `<p class="yellow">🟡 Tempo: -${diff} kg (Za wolno)</p>`;
   recommendation = "<p>Rozważ -100 kcal.</p>";
 }
 else if(diff >1){
   status = `<p class="red">🔴 Tempo: -${diff} kg (Za szybko)</p>`;
   recommendation = "<p>Rozważ +100 kcal.</p>";
 }

 if(last.energy <=2){
   recommendation += "<p>⚠ Niska energia – rozważ +100 kcal.</p>";
 }

 document.getElementById("trend").innerHTML = status;
 document.getElementById("recommendation").innerHTML = recommendation;
}

updateHome();

</script>
</body>
</html>
