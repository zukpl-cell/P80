<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P80</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
}
.container{
    padding:20px;
}
button{
    width:100%;
    padding:15px;
    margin:8px 0;
    background:#ff3c00;
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
}
input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:6px;
    border:none;
}
.card{
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}
h1{
    text-align:center;
}
.small{
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>P80</h1>

<div class="card">
<div id="countdown"></div>
<div id="currentWeight"></div>
<div id="currentCalories"></div>
</div>

<button onclick="showSection('diet')">🍳 Dieta</button>
<button onclick="showSection('training')">🏋️ Trening</button>
<button onclick="showSection('supplements')">💊 Suplementy</button>
<button onclick="showSection('checkin')">📊 Check-in</button>
<button onclick="showSection('stats')">📈 Statystyki</button>
<button onclick="showSection('settings')">⚙️ Ustawienia</button>

<div id="content"></div>

</div>

<script>

let targetDate = new Date("2026-06-10");
let data = JSON.parse(localStorage.getItem("p80data")) || [];
let calories = localStorage.getItem("p80calories") || 2050;

function updateHome(){
    let today = new Date();
    let diff = Math.ceil((targetDate - today)/(1000*60*60*24));
    document.getElementById("countdown").innerHTML = "🔥 Do celu: " + diff + " dni";
    document.getElementById("currentCalories").innerHTML = "Kalorie: " + calories + " kcal";

    if(data.length>0){
        document.getElementById("currentWeight").innerHTML = "Waga: " + data[data.length-1].weight + " kg";
    } else {
        document.getElementById("currentWeight").innerHTML = "Brak danych";
    }
}

function showSection(section){
    let content = document.getElementById("content");

    if(section=="diet"){
        content.innerHTML = `
        <div class="card">
        <h2>Dieta</h2>
        <p>Kalorie: ${calories} kcal</p>
        <p>Białko: 180g</p>
        <p>Węgle: <30g</p>
        </div>`;
    }

    if(section=="training"){
        content.innerHTML = `
        <div class="card">
        <h2>Trening</h2>
        <p>Pon – Trening 1</p>
        <p>Wt – Trening 2</p>
        <p>Śr – Trening 3</p>
        <p>Czw – Trening 4</p>
        <p>Pt – Trening 5</p>
        </div>`;
    }

    if(section=="supplements"){
        content.innerHTML = `
        <div class="card">
        <h2>Suplementy</h2>
        <p>08:30 Elektrolity</p>
        <p>09:00 B12 + Chrom</p>
        <p>13:00 Omega 3 + D3 + C</p>
        <p>16:30 Maślan</p>
        <p>21:00 Magnez</p>
        </div>`;
    }

    if(section=="checkin"){
        content.innerHTML = `
        <div class="card">
        <h2>Check-in</h2>
        <input id="weight" placeholder="Waga">
        <input id="bf" placeholder="BF%">
        <input id="ketones" placeholder="Ketony">
        <input id="energy" placeholder="Energia 1-5">
        <input id="sleep" placeholder="Sen 1-5">
        <button onclick="saveCheckin()">Zapisz</button>
        </div>`;
    }

    if(section=="stats"){
        content.innerHTML = `
        <div class="card">
        <h2>Statystyki</h2>
        <p>Liczba wpisów: ${data.length}</p>
        <button onclick="exportCSV()">Eksport CSV</button>
        </div>`;
    }

    if(section=="settings"){
        content.innerHTML = `
        <div class="card">
        <h2>Ustawienia</h2>
        <input id="newCalories" placeholder="Nowe kalorie">
        <button onclick="saveCalories()">Zapisz kalorie</button>
        </div>`;
    }
}

function saveCheckin(){
    let entry = {
        date: new Date().toISOString().split('T')[0],
        weight: document.getElementById("weight").value,
        bf: document.getElementById("bf").value,
        ketones: document.getElementById("ketones").value,
        energy: document.getElementById("energy").value,
        sleep: document.getElementById("sleep").value
    };
    data.push(entry);
    localStorage.setItem("p80data", JSON.stringify(data));
    updateHome();
    alert("Zapisano!");
}

function saveCalories(){
    calories = document.getElementById("newCalories").value;
    localStorage.setItem("p80calories", calories);
    updateHome();
    alert("Zapisano!");
}

function exportCSV(){
    let csv = "Date,Weight,BF,Ketones,Energy,Sleep\n";
    data.forEach(e=>{
        csv += `${e.date},${e.weight},${e.bf},${e.ketones},${e.energy},${e.sleep}\n`;
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "p80_data.csv";
    a.click();
}

updateHome();

</script>

</body>
</html>
