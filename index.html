<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P80</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
.container{padding:20px}
button{width:100%;padding:14px;margin:6px 0;background:#ff3c00;border:none;color:white;font-size:15px;border-radius:8px}
.card{background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:12px}
h1{text-align:center}
a{color:#ff7a00;text-decoration:none}
.green{color:#00ff88}
.yellow{color:#ffd000}
.red{color:#ff4d4d}
.small{font-size:13px;opacity:0.8}
details{margin-bottom:10px}
hr{border:0;border-top:1px solid #333;margin:12px 0}
input{padding:8px;border-radius:6px;border:none;margin:5px 0;width:100%}
</style>
</head>

<body>
<div class="container">

<h1>P80</h1>

<div class="card">
<div id="summary"></div>
<div id="trainingSummary"></div>
<div id="analysisBox"></div>
</div>

<button onclick="show('analysis')">📊 Analiza</button>
<button onclick="show('diet')">🍳 Dieta</button>
<button onclick="show('training')">🏋️ Trening</button>
<button onclick="show('checkin')">📝 Niedzielny Check-in</button>

<div id="content"></div>

<script>

const goal = 80;

const baseEntries = [
{date:"2026-01-01",weight:100},
{date:"2026-01-07",weight:95.10},
{date:"2026-01-17",weight:93.25},
{date:"2026-01-24",weight:92.30},
{date:"2026-01-31",weight:92.50},
{date:"2026-02-13",weight:91.05},
{date:"2026-02-19",weight:90.70},
{date:"2026-02-28",weight:89.00},
{date:"2026-03-01",weight:88.65}
];

let extraEntries = JSON.parse(localStorage.getItem("p80extra")) || [];
let trainings = JSON.parse(localStorage.getItem("p80trainings")) || {};
let savedWeek = localStorage.getItem("p80week") || "";

function getAllEntries(){
  return [...baseEntries, ...extraEntries];
}

function getWeekNumber(d){
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}

function resetIfNewWeek(){
  let now = new Date();
  let week = now.getFullYear()+"-"+getWeekNumber(now);
  if(savedWeek !== week){
    trainings = {};
    localStorage.setItem("p80trainings",JSON.stringify(trainings));
    localStorage.setItem("p80week",week);
  }
}

function updateSummary(){
  let entries = getAllEntries();
  let start = entries[0].weight;
  let current = entries[entries.length-1].weight;
  let lost = (start-current).toFixed(2);
  let percent = ((lost/(start-goal))*100).toFixed(1);

  document.getElementById("summary").innerHTML =
  `<b>Start:</b> ${start} kg<br>
   <b>Aktualnie:</b> ${current} kg<br>
   <b>Spadek:</b> ${lost} kg<br>
   <b>Realizacja celu:</b> ${percent}%`;

  updateTrainingSummary();
  updateWeeklyAnalysis();
}

function updateWeeklyAnalysis(){
  let entries = getAllEntries();
  if(entries.length < 2) return;

  let last = entries[entries.length-1];
  let prev = entries[entries.length-2];
  let diff = (prev.weight - last.weight).toFixed(2);

  let text="";
  if(diff >=0.4 && diff<=0.8){
    text=`<span class="green">🟢 Tempo: -${diff} kg / tydzień</span>`;
  } else if(diff <0.3){
    text=`<span class="yellow">🟡 Tempo: -${diff} kg → rozważ -100 kcal</span>`;
  } else if(diff >1){
    text=`<span class="red">🔴 Tempo: -${diff} kg → rozważ +100 kcal</span>`;
  }

  document.getElementById("analysisBox").innerHTML = text;
}

function toggleTraining(day){
 trainings[day]=!trainings[day];
 localStorage.setItem("p80trainings",JSON.stringify(trainings));
 updateTrainingSummary();
}

function updateTrainingSummary(){
 let count=0;
 ["pon","wt","sr","czw","pt"].forEach(d=>{
  if(trainings[d]) count++;
 });
 document.getElementById("trainingSummary").innerHTML="🏋️ Treningi w tym tygodniu: "+count+"/5";
}

function saveCheckin(){
 let w=parseFloat(document.getElementById("weight").value);
 let k=document.getElementById("ketones").value;
 let e=document.getElementById("energy").value;
 if(!w) return;
 extraEntries.push({date:new Date().toISOString().split("T")[0],weight:w,ketones:k,energy:e});
 localStorage.setItem("p80extra",JSON.stringify(extraEntries));
 location.reload();
}

function show(section){
 let c=document.getElementById("content");

 if(section==="analysis"){
  c.innerHTML=`<div class="card"><canvas id="chart"></canvas></div>`;
  let ctx=document.getElementById("chart");
  let entries=getAllEntries();
  new Chart(ctx,{
    type:'line',
    data:{
      labels:entries.map(e=>e.date),
      datasets:[{data:entries.map(e=>e.weight),borderColor:'#ff3c00',tension:0.3}]
    },
    options:{plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:"white"}},y:{ticks:{color:"white"}}}}
  });
 }

 if(section==="diet"){
  c.innerHTML=`
  <div class="card">
  <h2>IF 9:00–17:00 (1900 kcal)</h2>

  <details><summary>09:00 Śniadanie (~200 kcal)</summary>
  Masło 15 g + MCT 10 g<br>
  Zamienniki:<br>
  2 jajka + masło 10 g<br>
  Jogurt grecki 200 g + orzechy 20 g<br>
  Halloumi 80 g + oliwa 10 g
  </details>

  <details><summary>13:00 Obiad (~720 kcal)</summary>
  Kurczak 300 g + brokuł 300 g + oliwa 25 g<br>
  Zamienniki:<br>
  Polędwica / indyk / cielęcina / wołowina<br>
  Cukinia / kalafior / szpinak
  </details>

  <details><summary>16:30 Kolacja (~980 kcal)</summary>
  Twaróg 300 g + mascarpone 60 g + masło orzechowe 20 g<br>
  Zamienniki:<br>
  4 jajka + ser żółty 80 g + oliwa 15 g<br>
  Wołowina 250 g + ser 60 g + oliwa 10 g
  </details>

  <hr>
  Suplementacja:<br>
  9:00 – B12, Chrom, Elektrolity, Kreatyna<br>
  13:00 – Omega-3, D3+K2, C, Żelazo<br>
  16:30 – Maślan sodu<br>
  21:00 – Magnez
  </div>`;
 }

 if(section==="training"){
  c.innerHTML=`
  ${day("Pon","pon")}
  ${day("Wt","wt")}
  ${day("Śr","sr")}
  ${day("Czw","czw")}
  ${day("Pt","pt")}
  `;
 }

 if(section==="checkin"){
  c.innerHTML=`
  <div class="card">
  <input id="weight" placeholder="Waga">
  <input id="ketones" placeholder="Ketony">
  <input id="energy" placeholder="Energia 1-5">
  <button onclick="saveCheckin()">Zapisz</button>
  </div>`;
 }
}

function day(name,key){
 return `
 <details>
 <summary>${name}</summary>
 <div class="card">
  Trening wg planu<br>
  <input type="checkbox" ${trainings[key]?"checked":""}
  onclick="toggleTraining('${key}')"> Zrobione
 </div>
 </details>`;
}

resetIfNewWeek();
updateSummary();

</script>
</body>
</html>
