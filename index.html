<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P80</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
.container{padding:20px}
button{width:100%;padding:14px;margin:6px 0;background:#ff3c00;border:none;color:white;font-size:15px;border-radius:8px}
.card{background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:12px}
h1{text-align:center}
a{color:#ff7a00;text-decoration:none}
.green{color:#00ff88}
.yellow{color:#ffd000}
.red{color:#ff4d4d}
.small{font-size:13px;opacity:0.8}
hr{border:0;border-top:1px solid #333;margin:12px 0}
</style>
</head>

<body>
<div class="container">

<h1>P80</h1>

<div class="card">
<div id="summary"></div>
<div id="trainingSummary"></div>
</div>

<button onclick="show('analysis')">📊 Analiza</button>
<button onclick="show('diet')">🍳 Dieta</button>
<button onclick="show('training')">🏋️ Trening</button>

<div id="content"></div>

<script>

// ===== HISTORIA PROJEKTU =====
let goal = 80;

let entries = [
{date:"2026-01-01",weight:100},
{date:"2026-01-07",weight:95.10},
{date:"2026-01-17",weight:93.25},
{date:"2026-01-24",weight:92.30},
{date:"2026-01-31",weight:92.50},
{date:"2026-02-13",weight:91.05},
{date:"2026-02-19",weight:90.70},
{date:"2026-02-28",weight:89.00},
{date:"2026-03-01",weight:88.65}
];

let trainings = JSON.parse(localStorage.getItem("p80trainings")) || {};

function updateSummary(){
 let start = entries[0].weight;
 let current = entries[entries.length-1].weight;
 let lost = (start-current).toFixed(2);
 let percent = ((lost/(start-goal))*100).toFixed(1);

 document.getElementById("summary").innerHTML = `
 <b>Start:</b> ${start} kg<br>
 <b>Aktualnie:</b> ${current} kg<br>
 <b>Spadek:</b> ${lost} kg<br>
 <b>Realizacja celu:</b> ${percent}%`;
 updateTrainingSummary();
}

function show(section){
 let c=document.getElementById("content");

 if(section==="analysis"){
  c.innerHTML=`<div class="card"><canvas id="chart"></canvas></div>`;
  drawChart();
 }

 if(section==="diet"){
  c.innerHTML=`
  <div class="card">
  <h2>Plan (2050 kcal)</h2>

  <h3>09:00</h3>
  Kawa + masło 30g + MCT<br>
  <span class="small">350 kcal</span>

  <hr>

  <h3>13:00</h3>
  Kurczak 250g + brokuły 300g + oliwa 20g<br>
  <span class="small">650 kcal</span>

  <hr>

  <h3>16:30</h3>
  Twaróg 250g + mascarpone 50g + masło orzechowe 20g<br>
  <span class="small">750 kcal</span>

  </div>`;
 }

 if(section==="training"){
  c.innerHTML=`
  ${trainingCard("Pon","pon",`
  <a href="https://www.youtube.com/watch?v=L9XBjHDKWC4" target="_blank">Monster walk</a><br>
  <a href="https://www.youtube.com/watch?v=hQgFixeXdZo" target="_blank">DB RDL</a>
  `)}
  ${trainingCard("Wt","wt",`
  <a href="https://www.youtube.com/watch?v=Z66M-FJMc9U" target="_blank">Dead bug</a><br>
  <a href="https://www.youtube.com/watch?v=oZVCBM9f8Eo" target="_blank">Incline BP</a>
  `)}
  ${trainingCard("Śr","sr",`
  <a href="https://www.youtube.com/watch?v=6aLLiik02yU" target="_blank">Goblet squat</a>
  `)}
  ${trainingCard("Czw","czw",`
  <a href="https://www.youtube.com/watch?v=Fv5EYoJfRt4" target="_blank">Incline BP</a>
  `)}
  ${trainingCard("Pt","pt",`
  <a href="https://www.youtube.com/watch?v=5u1sZFbjPsQ" target="_blank">Staggered RDL</a>
  `)}
  `;
 }
}

function trainingCard(title,key,content){
 return `
 <div class="card">
 <h2>${title}</h2>
 ${content}
 <br>
 <input type="checkbox" ${trainings[key]?"checked":""}
 onclick="toggleTraining('${key}')"> Zrobione
 </div>`;
}

function toggleTraining(day){
 trainings[day]=!trainings[day];
 localStorage.setItem("p80trainings",JSON.stringify(trainings));
 updateTrainingSummary();
}

function updateTrainingSummary(){
 let count=0;
 ["pon","wt","sr","czw","pt"].forEach(d=>{
  if(trainings[d]) count++;
 });
 document.getElementById("trainingSummary").innerHTML="🏋️ Treningi w tym tygodniu: "+count+"/5";
}

function drawChart(){
 let ctx=document.getElementById("chart");
 new Chart(ctx,{
 type:'line',
 data:{
  labels:entries.map(e=>e.date),
  datasets:[{
   data:entries.map(e=>e.weight),
   borderColor:'#ff3c00',
   tension:0.3
  }]
 },
 options:{
  plugins:{legend:{display:false}},
  scales:{x:{ticks:{color:"white"}},y:{ticks:{color:"white"}}}
 }
 });
}

updateSummary();

</script>
</body>
</html>
