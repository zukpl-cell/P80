<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P80</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
.container{padding:20px}
button{width:100%;padding:14px;margin:6px 0;background:#ff3c00;border:none;color:white;font-size:15px;border-radius:8px}
input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
.card{background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:12px}
h1{text-align:center}
a{color:#ff7a00;text-decoration:none}
.green{color:#00ff88}
.yellow{color:#ffd000}
.red{color:#ff4d4d}
.small{font-size:13px;opacity:0.8}
hr{border:0;border-top:1px solid #333;margin:12px 0}
</style>
</head>

<body>
<div class="container">

<h1>P80</h1>

<div class="card">
<div id="countdown"></div>
<div id="weightDisplay"></div>
<div id="calorieDisplay"></div>
<div id="trainingSummary"></div>
</div>

<button onclick="show('analysis')">📊 Analiza</button>
<button onclick="show('diet')">🍳 Dieta</button>
<button onclick="show('training')">🏋️ Trening</button>
<button onclick="show('checkin')">📝 Niedzielny Check-in</button>

<div id="content"></div>

<script>

let targetDate = new Date("2026-06-10");
let entries = JSON.parse(localStorage.getItem("p80entries")) || [];
let calories = localStorage.getItem("p80calories") || 2050;
let trainings = JSON.parse(localStorage.getItem("p80trainings")) || {};

function updateHome(){
 let today = new Date();
 let diff = Math.ceil((targetDate - today)/(1000*60*60*24));
 document.getElementById("countdown").innerHTML = "🔥 Do celu: " + diff + " dni";
 document.getElementById("calorieDisplay").innerHTML = "Kalorie: " + calories + " kcal";

 if(entries.length>0){
   document.getElementById("weightDisplay").innerHTML = "Waga: " + entries[entries.length-1].weight + " kg";
 } else {
   document.getElementById("weightDisplay").innerHTML = "Brak wpisów";
 }

 updateTrainingSummary();
}

function show(section){
 let c = document.getElementById("content");

 // ===== DIETA =====
 if(section==="diet"){
  c.innerHTML=`
  <div class="card">
  <h2>Plan żywieniowy (2050 kcal)</h2>

  <h3>🕘 09:00 Śniadanie</h3>
  <p>Kawa + masło 30g + MCT 10–20g</p>
  <p class="small">~350 kcal | B:0 | T:40g | W:0</p>

  <b>Zamienniki:</b>
  <p>• 3–4 jajka + 20g masła</p>
  <p class="small">~450 kcal | B:28g | T:38g</p>

  <hr>

  <h3>🕐 13:00 Obiad</h3>
  <p>Kurczak 250g + brokuły 300g + oliwa 20g</p>
  <p class="small">~650 kcal | B:55g | T:45g | W:10g</p>

  <b>Zamienniki:</b>
  <p>• Stek 250g</p>
  <p>• Polędwica wieprzowa 250g</p>
  <p>• Tatar wołowy 200g</p>

  <hr>

  <h3>🕟 16:30 Kolacja</h3>
  <p>Twaróg 250g + mascarpone 50g + masło orzechowe 20g</p>
  <p class="small">~750 kcal | B:65g | T:55g | W:10g</p>

  <b>Zamienniki:</b>
  <p>• 4 jajka + sałata + oliwa</p>
  <p>• Halloumi 200g</p>

  <hr>

  <h3>Zasady korekcyjne</h3>
  <p>• Waga stoi 2 tyg → -100 kcal</p>
  <p>• Spadek >1kg → +100 kcal</p>
  <p>• Energia ≤2 → +100 kcal</p>

  </div>`;
 }

 // ===== TRENING =====
 if(section==="training"){
  c.innerHTML=`
  <div class="card">
  <h2>Pon – Trening 1</h2>
  <a href="https://www.youtube.com/watch?v=L9XBjHDKWC4" target="_blank">Monster walk</a><br>
  <a href="https://www.youtube.com/watch?v=hQgFixeXdZo" target="_blank">DB RDL</a><br>
  <input type="checkbox" onclick="toggleTraining('pon')"> Zrobione
  </div>

  <div class="card">
  <h2>Wt – Trening 2</h2>
  <a href="https://www.youtube.com/watch?v=Z66M-FJMc9U" target="_blank">Dead bug</a><br>
  <a href="https://www.youtube.com/watch?v=oZVCBM9f8Eo" target="_blank">Incline BP</a><br>
  <input type="checkbox" onclick="toggleTraining('wt')"> Zrobione
  </div>

  <div class="card">
  <h2>Śr – Trening 3</h2>
  <a href="https://www.youtube.com/watch?v=6aLLiik02yU" target="_blank">Goblet squat</a><br>
  <input type="checkbox" onclick="toggleTraining('sr')"> Zrobione
  </div>

  <div class="card">
  <h2>Czw – Trening 4</h2>
  <a href="https://www.youtube.com/watch?v=Fv5EYoJfRt4" target="_blank">Incline BP</a><br>
  <input type="checkbox" onclick="toggleTraining('czw')"> Zrobione
  </div>

  <div class="card">
  <h2>Pt – Trening 5</h2>
  <a href="https://www.youtube.com/watch?v=5u1sZFbjPsQ" target="_blank">Staggered RDL</a><br>
  <input type="checkbox" onclick="toggleTraining('pt')"> Zrobione
  </div>
  `;
 }

 // ===== ANALIZA =====
 if(section==="analysis"){
  c.innerHTML=`
  <div class="card">
  <h2>Analiza</h2>
  <canvas id="weightChart"></canvas>
  <div id="trend"></div>
  </div>`;
  drawChart();
  analyze();
 }

 // ===== CHECKIN =====
 if(section==="checkin"){
  c.innerHTML=`
  <div class="card">
  <h2>Niedzielny Check-in</h2>
  <input id="weight" placeholder="Waga">
  <input id="energy" placeholder="Energia 1-5">
  <button onclick="save()">Zapisz</button>
  </div>`;
 }

}

function save(){
 let entry={
  date:new Date().toISOString().split('T')[0],
  weight:parseFloat(document.getElementById("weight").value),
  energy:parseInt(document.getElementById("energy").value)
 };
 entries.push(entry);
 localStorage.setItem("p80entries",JSON.stringify(entries));
 updateHome();
 alert("Zapisano!");
}

updateHome();
 
function toggleTraining(day){
 trainings[day] = !trainings[day];
 localStorage.setItem("p80trainings",JSON.stringify(trainings));
 updateTrainingSummary();
}

function updateTrainingSummary(){
 let count = 0;
 let days = ["pon","wt","sr","czw","pt"];
 days.forEach(d=>{
   if(trainings[d]) count++;
 });
 document.getElementById("trainingSummary").innerHTML = "🏋️ Treningi w tym tygodniu: " + count + "/5";
}

function drawChart(){
 if(entries.length<1) return;

 let ctx = document.getElementById("weightChart");
 if(!ctx) return;

 let labels = entries.map(e=>e.date);
 let weights = entries.map(e=>e.weight);

 new Chart(ctx, {
   type: 'line',
   data: {
     labels: labels,
     datasets: [{
       label: 'Waga',
       data: weights,
       borderColor: '#ff3c00',
       tension: 0.3
     }]
   },
   options: {
     plugins:{legend:{display:false}},
     scales:{x:{ticks:{color:"white"}},y:{ticks:{color:"white"}}}
   }
 });
}

function analyze(){
 if(entries.length<2){
   document.getElementById("trend").innerHTML = "Za mało danych.";
   return;
 }

 let last = entries[entries.length-1];
 let prev = entries[entries.length-2];
 let diff = (prev.weight - last.weight).toFixed(2);

 let status="";

 if(diff >=0.4 && diff<=0.8){
   status = `<p class="green">🟢 Tempo: -${diff} kg / tydzień (Optymalne)</p>`;
 }
 else if(diff <0.3){
   status = `<p class="yellow">🟡 Tempo: -${diff} kg (Za wolno) → -100 kcal</p>`;
 }
 else if(diff >1){
   status = `<p class="red">🔴 Tempo: -${diff} kg (Za szybko) → +100 kcal</p>`;
 }

 if(last.energy <=2){
   status += `<p class="yellow">⚠ Niska energia → +100 kcal</p>`;
 }

 document.getElementById("trend").innerHTML = status;
}

updateHome();
</script>
</body>
</html>
